name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  check:
    # Windows обязателен: код использует pywinauto / win32 (импортируются тестами).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Version consistency (VERSION == top CHANGELOG)
        run: python scripts/ci/check_version.py

      # Один прогон pre-commit покрывает ruff (lint+format), mypy и file-hygiene
      # теми же ПИННУТЫМИ версиями, что и локально — CI и pre-commit не расходятся.
      - name: Lint, format, types, hygiene (pre-commit)
        run: python -m pre_commit run --all-files --show-diff-on-failure

      - name: Tests
        run: python -m pytest
