[tool.ruff]
line-length = 80
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",   # line too long — handled by formatter
]

[tool.pytest.ini_options]
# testpaths=tests (не только tests/unit): будущий tests/integration/ не будет
# молча пропущен CI. strict-markers ловит опечатки в @pytest.mark.
testpaths = ["tests"]
addopts = "-q --strict-markers"

[tool.mypy]
python_version = "3.12"

[[tool.mypy.overrides]]
module = "psutil"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "pywinauto"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "customtkinter"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "yaml"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "steam.*",
    "gevent.*",
    "win32api",
    "win32con",
    "win32gui",
    "win32process",
    "pywintypes",
]
ignore_missing_imports = true
