# SAM Automation — конфигурация
# Скопируй в config.yaml и заполни обязательные поля.

# ── Обязательные ──────────────────────────────────────────────────────────────

# API ключ Steam (бесплатно): https://steamcommunity.com/dev/apikey
steam_api_key: ""

# Steam ID, vanity name или полный URL профиля
# Примеры: "76561198000000000" / "gabelogannewell" / "https://steamcommunity.com/id/gabelogannewell"
steam_id: ""

# ── SAM ───────────────────────────────────────────────────────────────────────

# Путь к SAM.Game.exe. Если файл не найден — скачается автоматически с GitHub.
sam_game_exe_path: "./external/SAM/SAM.Game.exe"

# ── Фильтрация игр ────────────────────────────────────────────────────────────

# App ID игр, которые нужно пропустить (например: DLC, инструменты, демо)
# exclude_ids:
#   - 228980   # Steamworks Common Redistributables
#   - 250820   # SteamVR

# Путь к файлу со списком App ID (по одному на строку, # — комментарий)
# Используется вместо scan.py если нужен ручной список.
# game_ids_file: "my_games.txt"

# Явный список App ID (переопределяет scan.py и game_ids_file)
# game_ids:
#   - 570
#   - 730

# Путь к папке Steam (автоопределяется через реестр если пусто)
# steam_path: "C:/Program Files (x86)/Steam"

# ── Таймауты ──────────────────────────────────────────────────────────────────

# Задержка после запуска SAM.Picker.exe (сек)
launch_delay: 3

# Максимальное время ожидания загрузки игры в SAM (сек)
load_timeout: 20

# Пауза после Commit Changes (сек)
post_commit_delay: 0.2

# Пауза между играми (сек)
between_games_delay: 0.1

# ── Поведение ─────────────────────────────────────────────────────────────────

# Порог последовательных ошибок для аварийной остановки
max_consecutive_errors: 100

# ── Карточки (scripts/cards/farm.py) ─────────────────────────────────────────

# Сколько игр идлить одновременно (SAM.Game.exe запускается N раз параллельно)
max_concurrent_games: 1

# Минут между проверками количества оставшихся card drops
card_check_interval: 10

# ── Boost Playtime (scripts/playtime/boost.py) ────────────────────────────────

# Секунд идлить каждую игру. 120 = гарантированно Steam запишет >1 мин.
playtime_idle_duration: 120

# Целевой минимум playtime (мин). Игры ниже этого порога будут добиваться.
playtime_target_minutes: 3

# Сколько игр идлить параллельно. Главный рычаг скорости (idle платится один раз
# на батч). Выше — больше RAM и риск 'failed to connect to global user'.
playtime_concurrent_games: 10

# Пауза между стартами игр в батче (сек). Защита от гонки за global user;
# при большой параллельности заметно влияет на скорость.
launch_stagger: 3

# ── Telegram уведомления (опционально) ────────────────────────────────────────
# Удалённые уведомления о завершении/ошибках многочасового фарма — в отличие от
# Windows toast приходят на телефон. Пусто → отключено.
# Токен бота от @BotFather, chat_id от @userinfobot.
# telegram_bot_token: ""
# telegram_chat_id: ""
